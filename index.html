<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>destinyoooo</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --ink: #20242a;
      --muted: #68717d;
      --line: #d9dee5;
      --accent: #0f766e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    main {
      width: min(680px, 100%);
      padding: 32px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 12px 30px rgba(32, 36, 42, 0.06);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(30px, 5vw, 48px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
    }

    a {
      display: inline-flex;
      min-height: 44px;
      align-items: center;
      padding: 0 18px;
      border-radius: 6px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>destinyoooo</h1>
    <p>一些自己常用的小工具。</p>
    <a href="./goldprice/">打开金价换算工具</a>
  </main>
</body>
</html>
